<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>EVTX Inspector — Windows Event Log Analyzer | EVTX & CSV Viewer Online</title>
    <meta name="description" content="Free browser-based EVTX viewer and Windows Event Log analyzer. Parse, filter, and investigate .evtx files and CSV exports entirely offline — no uploads, no installation." />
    <meta name="keywords" content="evtx viewer online, evtx inspector, evtx analyzer, windows event log viewer online, evtx parser browser, dfir tool, event log analyzer, incident response, evtx viewer free, evtx file viewer" />
    <meta name="author" content="EVTX Inspector" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="EVTX Inspector — Windows Event Log Analyzer Online" />
    <meta property="og:description" content="Free EVTX viewer and Windows Event Log analyzer that runs in your browser. Zero uploads, zero telemetry. Fast, private, offline-first DFIR." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EVTX Inspector — Windows Event Log Analyzer Online" />
    <meta name="twitter:description" content="Free, private, browser-based EVTX viewer and Windows Event Log analyzer for incident response and DFIR. No uploads required." />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0d1117" />

    <!-- Structured data for rich search results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "EVTX Inspector",
      "url": "https://evtxinspector.app",
      "description": "Free browser-based EVTX viewer and Windows Event Log analyzer. Parse, filter, and investigate .evtx files entirely offline with zero uploads.",
      "applicationCategory": "SecurityApplication",
      "operatingSystem": "Web Browser",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "featureList": [
        "Windows EVTX file parsing",
        "CSV event log import",
        "Virtual scroll for large files",
        "Per-column OR filtering",
        "Row flagging and annotation",
        "Time range filtering",
        "Column reordering and resizing",
        "Dark and light mode",
        "Zero-upload privacy"
      ]
    }
    </script>

    <!-- Inline script: apply stored theme before React renders to prevent flash -->
    <script>
      (function(){
        var t = localStorage.getItem('evtx-theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
