    <!-- ===== Google Search Console ownership verification =====

    <!-- ===== Structured Data — SoftwareApplication ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "EVTX Inspector",
      "alternateName": "EVTX-Inspector",
      "url": "https://evtx-inspector.apurvashelar303.workers.dev/",
      "description": "Free browser-based EVTX viewer and Windows Event Log analyzer. Parse, filter, and investigate .evtx files entirely offline with zero uploads.",
      "applicationCategory": "SecurityApplication",
      "applicationSubCategory": "DFIR Tool",
      "operatingSystem": "Web Browser",
      "browserRequirements": "Requires JavaScript. Chrome 90+, Firefox 90+, Edge 90+, Safari 14+.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Windows EVTX file parsing (no upload)",
        "CSV event log import",
        "Virtual scroll for 100k+ events",
        "Per-column OR filtering",
        "Global search across all columns",
        "Row flagging and annotation (Suspicious / Reviewed / Noteworthy)",
        "Time range filtering with date pickers",
        "Column reordering, resizing, and visibility control",
        "Batch row operations via checkboxes",
        "Export flagged rows to CSV",
        "Dark and light mode",
        "Zero-upload, zero-telemetry privacy"
      ],
      "screenshot": "https://evtx-inspector.apurvashelar303.workers.dev/og-image.png"
    }
    </script>

    <!-- ===== Structured Data — FAQPage ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I open an EVTX file online?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Drag and drop your .evtx file onto EVTX Inspector — or click the + button in the sidebar. The file is parsed entirely in your browser using a Web Worker. Nothing is uploaded to any server."
          }
        },
        {
          "@type": "Question",
          "name": "Is EVTX Inspector free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. EVTX Inspector is completely free with no registration, no ads, and no data collection. All processing happens locally in your browser."
          }
        },
        {
          "@type": "Question",
          "name": "Does EVTX Inspector upload my log files?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Zero data leaves your browser. EVTX Inspector has no backend server. All parsing, filtering, and analysis runs locally via Web Workers and localStorage."
          }
        },
        {
          "@type": "Question",
          "name": "What file formats does EVTX Inspector support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "EVTX Inspector supports native .evtx binary Windows Event Log files and CSV exports from tools like EvtxECmd and Get-WinEvent."
          }
        }
      ]
    }
    </script>

    <!-- ===== Theme flash prevention — must run synchronously before React ===== -->
    <script>
      (function(){
        var t = localStorage.getItem('evtx-theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      })();
    </script>

    <div id="root"></div>
